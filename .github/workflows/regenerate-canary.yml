name: Regenerate SDK (canary)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: canary
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Generate
        run: ./generate.sh --spec canary

      - name: Analyze
        run: dart analyze

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(sdk): regenerate from canary OpenAPI"
          git push
