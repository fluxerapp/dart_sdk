name: Regenerate SDK (prod)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-stable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: stable
          fetch-depth: 0
          submodules: recursive

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
        with:
          sdk: stable

      - name: Generate
        run: ./generate.sh --spec prod

      - name: Analyze
        run: dart analyze --no-fatal-warnings

      - name: Commit and push
        run: |
          git config user.name "fluxer-automation"
          git config user.email "ci@fluxerapp.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(sdk): regenerate from prod OpenAPI"
          git push
